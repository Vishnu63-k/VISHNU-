<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#4CAF50;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#388E3C;
}

p{
    text-align:center;
    margin-top:15px;
}
a{
    text-decoration:none;
    color:blue;
}
</style>

</head>
<body>

<div class="login-box">

<h2>Student Login</h2>

<form action="dashboard.html">

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account?
<a href="#">Register</a>
</p>

</div>

</body>
</html>
