<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f4f4;
}

.header{
background:#4CAF50;
color:white;
padding:20px;
text-align:center;
font-size:25px;
}

.sidebar{
position:fixed;
width:220px;
height:100%;
background:#333;
padding-top:20px;
}

.sidebar a{
display:block;
color:white;
padding:15px;
text-decoration:none;
}

.sidebar a:hover{
background:#4CAF50;
}

.main{
margin-left:220px;
padding:30px;
}

.card-container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.card{
width:220px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
text-align:center;
}

.card h2{
font-size:35px;
color:#4CAF50;
}

.card p{
margin-top:10px;
font-size:18px;
}

</style>

</head>
<body>

<div class="header">
Student Lifecycle Management System
</div>

<div class="sidebar">

<a href="#">🏠 Dashboard</a>

<a href="#">👨‍🎓 Students</a>

<a href="#">👨‍🏫 Teachers</a>

<a href="#">📚 Courses</a>

<a href="#">📅 Attendance</a>

<a href="#">📝 Results</a>

<a href="login.html">🚪 Logout</a>

</div>

<div class="main">

<h1>Dashboard</h1>
<br>

<div class="card-container">

<div class="card">
<h2>250</h2>
<p>Total Students</p>
</div>

<div class="card">
<h2>20</h2>
<p>Teachers</p>
</div>

<div class="card">
<h2>15</h2>
<p>Courses</p>
</div>

<div class="card">
<h2>95%</h2>
<p>Attendance</p>
</div>

</div>

</div>

</body>
</html>
